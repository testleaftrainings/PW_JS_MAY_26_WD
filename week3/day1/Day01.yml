css:
Basic Loactor:
1.id
2.class
3.name
4.text

<input class="inputLogin" type="text" id="username" name="USERNAME" size="50">

<label for="username">Username</label>

tag name-> input, label

class,type,id,name,size -> attributeName

"inputLogin","text","username","USERNAME" -> attributeValue

black color text-Username -> text

id-unique value
name - name of the attribute
class -

<input class="inputLogin" type="text" id="username" name="USERNAME" size="50">


CSS : Cascading Style sheets
id attribute
1. #attributeValue -> #username
2. [id='username']
3. tagname[attributeName='attributeValue'] -> input[id='username']

name attribute:
1. [attributeName='attributeValue']-> [name='USERNAME']
2. tagname[attributeName='attributeValue'] -> input[name='USERNAME']

class attribute:
1. .attributeValue -> .decorativeSubmit
2. [class='decorativeSubmit']
3. tagname[attributeName='attributeValue'] -> input[class='decorativeSubmit']

.input r4 wide mb16 mt8 username -> it wll not work
.input.r4.wide.mb16.mt8.username -> it will work

.nav-input nav-progressive-attribute
.nav-input.nav-progressive-attribute

text value: link-> <a href=''>textvalue</a>
text='textvalue' -> `text='CRM/SFA'`


-> .first() -> it will select the first element
-> .last() -> it will select the last element
-> nth() -> it will select the nth element

(.inputLogin).first() -> username
(.inputLogin).last() -> password
(.inputLogin).nth(3) -> it will select the 4th element because
index value start with 0


