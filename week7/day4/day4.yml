AccessModifiers:

1. public : can be accessed inside and outside of the class
2. protected: can be accessed inside the class as well as the related class 
--> relationship--> inherit
3. private: not accessible outisde the class --> give permission to access or to rewrite "get" and "set"
4. readonly: constant/final --> cannot change the assigned value
5. static: belongs to the class and not to the object --> can be accessed 
without creating the object of the class.