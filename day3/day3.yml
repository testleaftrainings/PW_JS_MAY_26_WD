1xx – Informational
100 Continue → Request received, continue sending data.
2xx – Success
200 OK → Request successful.
201 Created → Resource created successfully.
202 Accepted → Request accepted for processing.
204 No Content → Success, but no response body.
3xx – Redirection
301 Moved Permanently → Resource moved permanently.
302 Found → Temporary redirect.
304 Not Modified → Cached version can be used.
4xx – Client Error
400 Bad Request → Invalid request data.
401 Unauthorized → Authentication required.
403 Forbidden → Access denied.
404 Not Found → Resource not found.
405 Method Not Allowed → HTTP method not supported.
409 Conflict → Data conflict (duplicate record, etc.).
415 Unsupported Media Type → Wrong content type.
422 Unprocessable Entity → Validation error.
429 Too Many Requests → Rate limit exceeded.
5xx – Server Error
500 Internal Server Error → Generic server error.
501 Not Implemented → Feature not supported.
502 Bad Gateway → Invalid response from upstream server.
503 Service Unavailable → Server temporarily unavailable.
504 Gateway Timeout → Upstream server timeout.
Real-Time Examples
Scenario	Method	Status Code
Get user details	GET	200 OK
Create new user	POST	201 Created
Delete user	DELETE	204 No Content
Invalid request payload	POST	400 Bad Request
Login without token	GET	401 Unauthorized
User has no permission	GET	403 Forbidden
User ID not found	GET	404 Not Found
Duplicate email registration	POST	409 Conflict
Server crash	Any	500 Internal Server Error
Frequently Asked Interview Question

Difference between 401 and 403

401 Unauthorized → Authentication is missing or invalid.
Example: No JWT token provided.
403 Forbidden → User is authenticated but doesn't have permission.
Example: Normal user trying to access Admin API.

Example:

GET /admin/users

401 -> No token sent
403 -> Token valid, but user is not Admin
Easy Memory Trick
2xx → Success ✅
3xx → Redirect ↪️
4xx → Client Mistake ❌
5xx → Server Problem 🔥

Difference Between Path Parameter and Query Parameter
Feature	  Path Parameter	                               Query Parameter
Location	Part of the URL                             path	After ? in URL
Purpose	  Identifies a specific resource               	Filters, sorts, or modifies results
Mandatory	Usually required                             	Usually optional
Syntax	  /users/123	                                       /users?id=123
Multiple  Values	/users/123/orders/456	                /users?status=active&page=1