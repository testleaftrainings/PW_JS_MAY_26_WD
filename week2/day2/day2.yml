== → Loose Equality
Compares value only
JavaScript automatically converts datatype (type coercion)
(5=='5')
(num==string(number))=(5==5)


=== → Strict Equality
Compares value + datatype
No automatic conversion
(5==='5') false
('5'==='5') true


Best Practice
================
Prefer === in real projects and automation testing.

Why?
Safer
Predictable
Avoids datatype conversion issues

